body:
  text: 此章靈符鎭人肝中若人肝受病以朱書燒灰服之立愈南方第二金章靈符眞文神呪南方三氣赤靈丹天丹靈眞老三氣天君司命司録絳闕尊神火德明秀會道合眞此章靈符鎭人心中若人心受病以朱書焼灰服之立愈中央第三金章靈符眞文神呪緫監衆靈十二之天元靈元老十二天君都録校籍主鎭脾神土德鎭秀會道合眞此章靈符鎭人脾中若人脾受病以朱書燒灰服之立愈西方第四金章靈符眞文神呪西方七氣太白之天皓靈皇老七氣天君記名安魄主鎭肺神金德堅秀會道合眞此章靈符鎭人肺中若人肺受病以朱書燒灰服之立愈北方第五金章靈符眞文神呪北方五氣玄中之天五靈玄老五氣天君追生落死主鎭腎神水德善秀會道合眞此章靈符鎭人腎中若人腎受病以朱書燒灰服之立愈爾時老君再說此五方眞文神呪即召五方五斗星君降此靈符眞文神呪各授五斗星君即以金書玉篆各依其方緫得受持注生世人以此靈文安鎭五臓各鎭人身凡人性命皆由九天生氣五斗星君本命元辰主掌靈神若復有人能知根本但遇三元五臘本命生辰北斗下日嚴置壇場隨力章醮供養五方五老乃吾化身注生聖衆五斗星君本命元辰醮獻錢財以答衆眞注我生身得生中國得遇大道廕佑之恩當生之時天曹地府願許本命錢且甲乙生人命屬東斗九氣爲人受生之時曾許本命銀錢九萬貫文丙丁生人命屬南斗三氣爲人受生之時曽許本命銀錢三萬貫文戊己生人命屬中斗一十二氣爲人受生之時曽許本命銀錢一十二萬貫文庚辛生人命屬西斗七氣爲人受生之時曽許本命銀錢七萬貫文壬癸生人命屬北斗五氣爲人受生之時曽許本命銀錢五萬贯文若有善信男女種諸善根善根不斷世世爲人當須醮送五本命錢天曹地府各有明文十二本命十二庫神子生之人第一庫中辰生之人第二庫中申生之人第三庫中亥生之人第四庫中卯生之人第五庫中未生之人第六庫中寅生之人第七庫中午生之人第八庫中戍生之人第九庫中巳生之人第十庫中酉生之人第十一庫中丑生之人第十二庫中乃是生人各有財禄命庫若人本命之日依此焼醮了足别無少欠即得見世安樂出入通逹吉無不利所願如心自有本命星官常垂廕佑使保天年過世之時不失人身得生冨貴文武星臨財星禄星五福照曜身命胎宫安樂長夀不值惡縁若有男女生身果薄無力章醮可於本命之日請正一道士或一或二或三或五或於宫觀或就家庭持誦五斗金章寶經或以自願持誦毎誦一遍折錢一萬貫文又志心持念托化受生天尊或千或萬當來托生人中三世長爲男子之身五體全備十相端嚴一切恭敬得遇無上正眞之道是時五方五老帝君五斗星君南斗六司星君北斗七元星君九天聖衆本命星官元辰星官功曹靈官金童玉女一會神仙得聞老君說此眞經一時歡喜禮謝玄元各願受持時有始老帝君出班長跪而作是偈稽首禮謝珍重而退稽首眞元無上尊一心信奉不思議如斯妙法未曽聞今日今時盡得之能爲黒暗開光明能爲疾病作良醫妙哉神呪五靈符誓願歸依各受持太上老君說五斗金章受生經
