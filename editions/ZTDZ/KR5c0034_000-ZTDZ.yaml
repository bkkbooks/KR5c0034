front:
  text: 太上老君說五斗金章受生經爾時太上老君在太清境上大赤天中黃金殿内召五老帝君及東斗注筭君南斗上生君西斗記名君北斗落死君中斗緫監君九天生神君九天注生君九天注禄君九天掌籍掌筭君九天財庫禄庫君九天消災散禍君九天聖母九天太一元君九天監生大神北斗七元星君南斗六司星君本命元辰建生星斗君各隨本部功曹靈官金童玉女無量聖衆一時同會稽首禮拜燒香散花歩虛旋繞長跪道前諦聽法言太上老君廣宣要妙告示五方五老一切聖衆曰吾昔於混沌之中天地未分元化體一布氣十方成就萬象生天生地負隂抱陽陽氣上升化生諸天隂氣下降化生諸地陽之餘氣化爲男子隂之餘氣化爲女人隂陽二氣混合自然生生化化乃有人倫旣有人倫宿命因縁有善有惡有長有短有貴有賤有冨有貧善惡之報如影逐形如響應聲作善善應作惡惡成種蘭得香種粟得粮爲善降祥爲惡降殃一切因縁皆由福業且人生下土命係上天人之生也頂天履地有隂有陽各有五行正氣各有五斗所管本命元辰十二相屬且甲乙生人東斗注生丙丁生人南斗注生戊己生人中斗注生庚辛生人西斗注生壬癸生人北斗注生注生之時各禀五行眞氣眞氣混合結秀成胎受胎十月周回十方十方生氣包羅元始杳杳冥冥其中有精恍恍惚惚其中有物視不見我聽不得聞離種種邊名爲妙道妙道在人不可輕失失之甚易保之甚難多迷眞道多逐邪源多好婬殺多好貪嗔多沉地獄多失人身受生之時五斗星君九天聖衆注生注䘵注冨注貧注長注短注吉注凶皆由衆生自作自受若人在世之日心崇大道供養天尊孝順父母和同六親不嫉不妬不貪不婬或持齋戒或作善縁或受三戒五戒十戒十二可從戒十四持身戒二十四戒三十六戒七十二戒一百八戒三百大戒或修上清齋金籙齋三元齋三七齋庚申齋甲子齋本命齋如是齋戒若有善男子善女人受持之者名係天人世世生生不失人身冨貴聦明人中殊勝五體具足十相端嚴且人之生也皆受五方五老帝君各降眞氣金章靈符混合自然化生爲人吾今宣說東方第一金章靈符眞文神呪東方九炁始青天中青靈始老九炁天君眞人按筆下注人身木徳結秀會道合眞
